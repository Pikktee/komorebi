name: Deploy (Railway)

# Baut das Frontend und deployt es zu Railway (Service "frontend").
# Läuft bei jedem Push auf main, manuell und – via Dispatch – nach dem täglichen Daten-Cron.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: railway-deploy
  cancel-in-progress: true

jobs:
  deploy-railway:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Installieren
        working-directory: web
        run: npm ci

      - name: Build (Wurzelpfad /)
        working-directory: web
        run: npm run build

      - name: Railway CLI installieren
        run: npm i -g @railway/cli

      # Guard: Ohne Token wird sauber übersprungen (gelbe Warnung) statt rot zu scheitern.
      - name: RAILWAY_TOKEN prüfen
        id: token
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN fehlt – Deploy wird übersprungen. Im Repo unter Settings → Secrets → Actions hinterlegen."
            echo "vorhanden=false" >> "$GITHUB_OUTPUT"
          else
            echo "vorhanden=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Zu Railway deployen
        if: steps.token.outputs.vorhanden == 'true'
        run: railway up --service frontend --detach --no-gitignore
